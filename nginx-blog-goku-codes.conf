# blog.goku.codes — gwern-powered blog
server {
    server_name blog.goku.codes;

    root /home/ubuntu/blog-site/_site;
    index index.html;

    # Pretty URLs: /hello-world/ → /hello-world/index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # Static assets (CSS, JS, fonts)
    location /static/ {
        alias /home/ubuntu/blog-site/_site/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/blog.goku.codes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.goku.codes/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

server {
    if ($host = blog.goku.codes) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name blog.goku.codes;
    return 404;
}
